name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    name: "Lint (markdown + frontmatter + stale-refs)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Placeholder — filled by plan 13-02
        run: echo "lint job placeholder — plan 13-02 lands markdownlint + lychee + frontmatter + stale-refs"

  validate:
    name: "Validate (schemas + plugin + shellcheck)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Placeholder — filled by plan 13-02 + 13-03
        run: echo "validate job placeholder — plan 13-02 lands ajv schemas; plan 13-03 lands plugin validate + shellcheck"

  test:
    name: "Test (Node ${{ matrix.node-version }} / ${{ matrix.os }})"
    needs: [lint, validate]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Run tests
        run: npm test

  security:
    name: "Security (secrets + injection scan)"
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Placeholder — filled by plan 13-04
        run: echo "security job placeholder — plan 13-04 lands gitleaks + injection-scanner"

  size-budget:
    name: "Size budget (blocking)"
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Placeholder — filled by plan 13-04
        run: echo "size-budget job placeholder — plan 13-04 lands blocking agent-size-budget gate"
